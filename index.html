    <!-- Critical CSS -->
    <style>
      #root{min-height:100vh}
      .animate-spin{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
      #pwa-splash{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px;background:linear-gradient(135deg,#f0fdf6 0%,#e6f7ef 50%,#d1f5e0 100%)}
      @media(prefers-color-scheme:dark){#pwa-splash{background:linear-gradient(135deg,#0a1f15 0%,#0d2b1e 50%,#112f22 100%)}}
      @media(display-mode:standalone){#pwa-splash{display:flex}#initial-loader{display:none!important}}
      #pwa-splash .splash-logo{width:80px;height:80px;animation:fadeIn .4s ease-out}
      #pwa-splash .splash-name{font-family:Cairo,sans-serif;font-size:22px;font-weight:700;color:#22996E;animation:fadeIn .4s ease-out .1s both}
      #pwa-splash .splash-spinner{width:28px;height:28px;border:3px solid #22996E;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
    </style>

  <body>
    <!-- PWA Splash — shown instantly in standalone mode (no JS needed) -->
    <div id="pwa-splash">
      <img class="splash-logo" src="/favicon.png" alt="iRecycle" width="80" height="80" />
      <span class="splash-name">iRecycle</span>
      <div class="splash-spinner"></div>
    </div>

    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
        <div style="width:40px;height:40px;border:3px solid #22996E;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
      </div>
    </div>
    <script>
      // Early auth redirect — skip homepage entirely for logged-in users
      // Runs BEFORE React loads for instant navigation
      (function(){
        if(window.location.pathname!=='/') return;
        try{
          var keys=Object.keys(localStorage);
          for(var i=0;i<keys.length;i++){
            if(keys[i].indexOf('auth-token')!==-1){
              var v=localStorage.getItem(keys[i]);
              if(v&&v.indexOf('access_token')!==-1){
                window.location.replace('/dashboard');
                return;
              }
            }
          }
        }catch(e){}
      })();

      // Recovery fallback for slow connections
      (function() {
        setTimeout(function() {
          if (window.__APP_BOOTSTRAPPED__) return;
          var loader = document.getElementById('initial-loader');
          var splash = document.getElementById('pwa-splash');
          var target = splash && splash.style.display !== 'none' ? splash : loader;
          if (!target) return;
          var p = document.createElement('p');
          p.style.cssText = 'direction:rtl;font-family:Cairo,sans-serif;text-align:center;color:#666;font-size:14px;margin-top:16px;';
          p.innerHTML = 'التحميل يستغرق وقتاً أطول من المتوقع...<br/><button onclick="location.reload()" style="margin-top:12px;padding:10px 28px;background:#22996E;color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-family:Cairo,sans-serif;">تحديث الصفحة</button>';
          target.appendChild(p);
        }, 8000);
      })();
    </script>
