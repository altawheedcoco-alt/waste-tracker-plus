  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
        <div style="width:40px;height:40px;border:3px solid #10b981;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
      </div>
    </div>
    <script>
      // CRITICAL: Aggressively clean old Service Workers and caches BEFORE loading the app
      // This runs immediately to prevent old SW from intercepting requests
      (function(){
        // Unregister ALL service workers
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){ r.unregister(); });
          });
          // Force the page to not be controlled by any SW
          if(navigator.serviceWorker.controller){
            navigator.serviceWorker.controller.postMessage({type:'SKIP_WAITING'});
          }
        }
        // Delete ALL caches
        if('caches' in window){
          caches.keys().then(function(names){
            names.forEach(function(n){ caches.delete(n); });
          });
        }
      })();

      // Show reload message if app doesn't load within 10 seconds (reduced from 15)
      setTimeout(function(){
        var loader = document.getElementById('initial-loader');
        if(loader && document.getElementById('root').contains(loader)){
          // Clear all caches and try reload automatically first time
          var autoKey = '__auto_boot_reload';
          var lastAuto = Number(sessionStorage.getItem(autoKey) || '0');
          if(Date.now() - lastAuto > 60000){
            sessionStorage.setItem(autoKey, String(Date.now()));
            if('caches' in window){ caches.keys().then(function(n){ n.forEach(function(k){ caches.delete(k); }); }); }
            location.reload();
            return;
          }
          var p = document.createElement('p');
          p.style.cssText='direction:rtl;font-family:Cairo,sans-serif;text-align:center;color:#666;font-size:14px;';
          p.innerHTML='التحميل يستغرق وقتاً أطول من المتوقع...<br/><button onclick="sessionStorage.clear();location.reload()" style="margin-top:12px;padding:8px 24px;background:#10b981;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">إعادة تحميل</button>';
          loader.appendChild(p);
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
