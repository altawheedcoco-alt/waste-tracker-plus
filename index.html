  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
        <div style="width:40px;height:40px;border:3px solid #10b981;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
      </div>
    </div>
    <script>
      // Clear all browser caches on first load after deploy
      (function() {
        var cacheKey = 'irecycle-build-v8';
        if (!localStorage.getItem(cacheKey)) {
          // Clear old build markers
          Object.keys(localStorage).forEach(function(k) {
            if (k.startsWith('irecycle-build-')) localStorage.removeItem(k);
          });
          localStorage.setItem(cacheKey, '1');
          // Clear Cache API if available
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
          }
          // Force fresh load if this is a stale page
          if (performance.navigation && performance.navigation.type !== 1) {
            location.replace(location.pathname + '?v=' + Date.now());
          }
        }
      })();
    </script>
    <script>
      // Recovery: if app hasn't bootstrapped in 8s, offer cache-busted reload
      setTimeout(function () {
        if (window.__APP_BOOTSTRAPPED__) return;
        var loader = document.getElementById('initial-loader');
        if (!loader) return;
        var p = document.createElement('p');
        p.style.cssText = 'direction:rtl;font-family:Cairo,sans-serif;text-align:center;color:#666;font-size:14px;margin-top:16px;';
        p.innerHTML = 'التحميل يستغرق وقتاً أطول من المتوقع...<br/>' +
          '<button onclick="location.replace(location.pathname+\'?v=\'+Date.now())" style="margin-top:12px;padding:10px 28px;background:#10b981;color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-family:Cairo,sans-serif;">تحديث وفتح الموقع</button>';
        loader.appendChild(p);
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;direction:rtl;font-family:sans-serif;">

      </div>
    </noscript>
