    <!-- Critical CSS -->
    <style>
      #root{min-height:100vh}
      .animate-spin{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>

  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
        <div style="width:40px;height:40px;border:3px solid #10b981;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
      </div>
    </div>
    <script>
      // Cache-bust on new deploy + recovery fallback
      (function() {
        var BUILD = 'v9';
        var key = 'irecycle-build-' + BUILD;
        if (!localStorage.getItem(key)) {
          Object.keys(localStorage).forEach(function(k) {
            if (k.startsWith('irecycle-build-')) localStorage.removeItem(k);
          });
          localStorage.setItem(key, '1');
          if ('caches' in window) caches.keys().then(function(n) { n.forEach(function(c) { caches.delete(c); }); });
          if (!location.search.includes('v=')) location.replace(location.pathname + '?v=' + Date.now());
          return;
        }
        setTimeout(function() {
          if (window.__APP_BOOTSTRAPPED__) return;
          var loader = document.getElementById('initial-loader');
          if (!loader) return;
          var p = document.createElement('p');
          p.style.cssText = 'direction:rtl;font-family:Cairo,sans-serif;text-align:center;color:#666;font-size:14px;margin-top:16px;';
          p.innerHTML = 'التحميل يستغرق وقتاً أطول من المتوقع...<br/><button onclick="location.replace(location.pathname+\'?v=\'+Date.now())" style="margin-top:12px;padding:10px 28px;background:#10b981;color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-family:Cairo,sans-serif;">تحديث وفتح الموقع</button>';
          loader.appendChild(p);
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
